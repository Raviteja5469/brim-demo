name: Deploy Next.js to GitHub Pages

on:
  push:
    branches:
      - master # Triggers the workflow on push to the master branch

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: ${{ hashFiles('package-lock.json') != '' && 'npm' || '' }}

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build
        env:
          GITHUB_PAGES: "true" # Applies the /brim-demo basePath for Pages hosting

      - name: Upload production-ready static assets
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out # Next.js static export outputs to the 'out' directory by default

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
